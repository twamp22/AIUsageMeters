[Rainmeter]
Update=1000
Background=#@#Background.png
BackgroundMode=3
BackgroundMargins=0,34,0,14

[Metadata]
Name=Codex Limits
Information=Codex local token totals over recent windows (illustro style).
License=Creative Commons BY-NC-SA 3.0
Version=1.0.0

[Variables]
fontName=Trebuchet MS
textSize=8
colorBar=70,170,255,255
colorText=255,255,255,205
DataFile=#@#UsageData.json

[measureSessionPercent]
Measure=Script
ScriptFile=#@#MeterHelpers.lua
DataFile=#DataFile#
ResultName=CodexSessionPercent
MinValue=0
MaxValue=100

[measureSessionText]
Measure=Script
ScriptFile=#@#MeterHelpers.lua
DataFile=#DataFile#
ResultName=CodexSessionText

[measureWeeklyPercent]
Measure=Script
ScriptFile=#@#MeterHelpers.lua
DataFile=#DataFile#
ResultName=CodexWeeklyPercent
MinValue=0
MaxValue=100

[measureWeeklyText]
Measure=Script
ScriptFile=#@#MeterHelpers.lua
DataFile=#DataFile#
ResultName=CodexWeeklyText

[styleTitle]
StringAlign=Center
StringCase=Upper
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,50
FontColor=#colorText#
FontFace=#fontName#
FontSize=10
AntiAlias=1
ClipString=1

[styleLeftText]
StringAlign=Left
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[styleRightText]
StringAlign=Right
StringCase=None
StringStyle=Bold
StringEffect=Shadow
FontEffectColor=0,0,0,20
FontColor=#colorText#
FontFace=#fontName#
FontSize=#textSize#
AntiAlias=1
ClipString=1

[styleBar]
BarColor=#colorBar#
BarOrientation=HORIZONTAL
SolidColor=255,255,255,15

[meterTitle]
Meter=String
MeterStyle=styleTitle
X=100
Y=12
W=190
H=18
Text=Codex Tokens

[meterLabelSession]
Meter=String
MeterStyle=styleLeftText
X=10
Y=40
W=190
H=14
Text=Last 5h

[meterValueSession]
Meter=String
MeterStyle=styleRightText
MeasureName=measureSessionText
X=200
Y=0r
W=190
H=14
Text=%1
DynamicVariables=1

[meterBarSession]
Meter=Bar
MeterStyle=styleBar
MeasureName=measureSessionPercent
MaxValue=100
X=10
Y=52
W=190
H=1
DynamicVariables=1

[meterLabelWeekly]
Meter=String
MeterStyle=styleLeftText
X=10
Y=60
W=190
H=14
Text=Last 7d

[meterValueWeekly]
Meter=String
MeterStyle=styleRightText
MeasureName=measureWeeklyText
X=200
Y=0r
W=190
H=14
Text=%1
DynamicVariables=1

[meterBarWeekly]
Meter=Bar
MeterStyle=styleBar
MeasureName=measureWeeklyPercent
MaxValue=100
X=10
Y=72
W=190
H=1
DynamicVariables=1
